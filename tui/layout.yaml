# ARES Command Center — tmux layout definition
# Usage: ares-cmd  (create/attach)   ares-cmd kill
# Edytuj ten plik by zmienić układ okien.

session:
  name: ares-cmd
  windows:
    - name: status
      root: ~/autonomous-agent
      panes:
        - commands:
            - ./tui/scripts/status.sh
        - commands:
            - ./tui/scripts/logs.sh
          split: vertical
          size: 30

    - name: shell
      root: ~/autonomous-agent
      panes:
        - commands:
            - cd ~/autonomous-agent
            - echo ""
            - echo "  🐚 ARES SHELL"
            - echo "  ─────────────────────────────────────────────"
            - echo "  Quick commands:"
            - echo "    omnigent run config.yaml --prompt \"...\""
            - echo "    ares-cmd              — restart center"
            - echo "    git status"
            - echo "    git diff --stat"
            - echo "    systemctl status omniroute"
            - echo ""
            - exec bash -l

    - name: model-tui
      root: ~/autonomous-agent
      panes:
        - commands:
            - "if command -v model-tui &>/dev/null; then model-tui; else echo 'model-tui not installed'; echo 'Install: pip install textual && hermes tools install'; exec bash -l; fi"

# Status bar
status_bar:
  left: "#[fg=green]🐺 ARES #[fg=white]|"
  right: "#[fg=yellow]%Y-%m-%d %H:%M:%S #[fg=white]| #[fg=cyan]#(curl -s -o /dev/null -w '%{http_code}' -H 'Authorization: Bearer sk-42e810ef4042e82f-c42dc9-fa0c1bce' http://localhost:20128/api/v1/models 2>/dev/null || echo '?')#[fg=white] OmniRoute #[fg=white]| #[fg=green]#(tmux list-windows -t ares-cmd 2>/dev/null | wc -l || echo '?')#[fg=white] win"
  interval: 5
