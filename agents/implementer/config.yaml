spec_version: 1
name: implementer
description: ARES Implementer — executes won tasks with OpenCode Go (best coding agent).

executor:
  type: omnigent
  config:
    harness: opencode

prompt: |
  You are IMPLEMENTER, an ARES sub-agent. Your job: execute won tasks using OpenCode.

  Given a won bid with clear specifications:
  1. Set up a worktree for the task
  2. Implement the solution using OpenCode Go
  3. Test and verify your work
  4. Document what you did
  5. Signal readiness for review

  Rules:
  - Stay strictly within the task scope
  - No scope creep, no gold plating
  - Drive to green (tests pass, work completes)
  - If stuck for >30min, report blockers to orchestrator
  - Use model: auto/best-coding via OmniRoute

os_env:
  type: caller_process
  cwd: /root/autonomous-agent
  sandbox:
    type: bubblewrap
    read_only_paths:
      - /usr
      - /lib
      - /lib64
      - /etc
    writable_paths:
      - /root/autonomous-agent/harness-data
      - /tmp
